name: IDP CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: templates/appservice-template

      - name: OPA Policy Check (Compliance Engine)
        run: |
          echo "Running compliance checks..."
          opa eval -i scripts/input.json -d scripts/policy.rego "data"

      - name: Terraform Plan
        run: terraform plan
        working-directory: templates/appservice-template

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: templates/appservice-template
