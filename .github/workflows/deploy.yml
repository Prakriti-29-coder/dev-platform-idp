name: IDP CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terraform Init
        run: terraform init
        working-directory: templates/appservice-template

      - name: Install OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x opa
          sudo mv opa /usr/local/bin/

      - name: OPA Policy Check (Compliance Engine)
        run: |
          echo "Running compliance checks..."
          opa eval -i scripts/input.json -d scripts/policy.rego "data"

      - name: Terraform Plan
        run: terraform plan -var="app_name=dev-web-app-ci"
        working-directory: templates/appservice-template

      - name: Terraform Apply
        run: terraform apply -auto-approve -var="app_name=dev-web-app-ci"
        working-directory: templates/appservice-template
